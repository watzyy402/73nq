<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>73nq | Relentless Pursuit</title>
    <style>
        :root {
            --bg: #010401;
            --accent: #153a15;
            --glow: #2ecc71;
            --glass: rgba(255, 255, 255, 0.02);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* --- BACKGROUND LAYER --- */
        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 200%; height: 200%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotateX(60deg) translateY(-50%);
            animation: gridMove 20s linear infinite;
            z-index: 0;
            opacity: 0.3;
        }

        @keyframes gridMove {
            0% { transform: rotateX(60deg) translateY(-50%); }
            100% { transform: rotateX(60deg) translateY(0%); }
        }

        .aura {
            position: fixed;
            width: 600px; height: 600px;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            filter: blur(80px);
            opacity: 0.5;
        }

        /* --- CENTRAL GLASS CONTAINER --- */
        .glass-box {
            position: relative;
            z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 60px 80px;
            border-radius: 2px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .nasdaq-tag {
            font-size: 0.6rem;
            letter-spacing: 5px;
            color: var(--glow);
            margin-bottom: 15px;
            display: block;
            font-weight: 900;
        }

        h1 {
            font-size: 6rem;
            font-weight: 900;
            letter-spacing: -5px;
            line-height: 0.8;
            margin-bottom: 10px;
            text-transform: lowercase;
            background: linear-gradient(to bottom, #fff, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-size: 0.8rem;
            letter-spacing: 15px;
            text-transform: uppercase;
            font-weight: 300;
            opacity: 0.4;
            margin-bottom: 40px;
        }

        /* --- ACTION BUTTONS --- */
        .btn-group { display: flex; gap: 20px; justify-content: center; }

        .btn {
            padding: 18px 40px;
            border: 1px solid rgba(255,255,255,0.2);
            text-decoration: none;
            color: #fff;
            font-size: 0.7rem;
            letter-spacing: 3px;
            transition: 0.4s;
            background: transparent;
        }

        .btn:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }

        /* --- FLOATING DECO --- */
        .pnl {
            position: absolute;
            font-family: monospace;
            font-size: 0.7rem;
            color: var(--glow);
            opacity: 0.6;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* --- TICKER --- */
        .footer-ticker {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: rgba(0,0,0,0.9);
            border-top: 1px solid rgba(255,255,255,0.05);
            padding: 12px;
            font-size: 0.65rem;
            font-family: monospace;
            color: var(--glow);
            overflow: hidden;
            white-space: nowrap;
        }

        .ticker-move {
            display: inline-block;
            animation: ticker 25s linear infinite;
        }

        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="aura"></div>

    <div class="glass-box">
        <span class="nasdaq-tag">INDEXED ACCESS // NAS100</span>
        <h1>73nq</h1>
        <h2>RELENTLESS PURSUIT.</h2>

        <div class="btn-group">
            <a href="https://discord.gg/ZNVeRGHFr" target="_blank" class="btn">DISCORD</a>
            <a href="https://www.instagram.com/1heeeb777?igsh=MXVwbDNiYWV6YnR4ag%3D%3D&utm_source=qr" target="_blank" class="btn">INSTAGRAM</a>
        </div>

        <div class="pnl" style="top: -60px; left: -80px;">$8,765.43 ▲</div>
        <div class="pnl" style="bottom: -40px; right: -90px; color: white; opacity: 0.2;">ALPHA_FUTURES_CERTIFIED</div>
    </div>

    <div class="footer-ticker">
        <div class="ticker-move">
            NAS100: 18,245.30 (+1.24%) • GOLD: 2,154.20 (+0.45%) • BTC: 68,432.10 (+2.10%) • 73NQ STATUS: EXECUTING • SMART MONEY CONCEPTS: ACTIVE • MIAMI_ACCESS: GRANTED •
        </div>
    </div>

</body>
</html>
