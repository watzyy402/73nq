<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>73nq | Relentless Pursuit</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --glass: rgba(0, 0, 0, 0.45);
            --border: rgba(255, 255, 255, 0.12);
            --accent: #2ecc71;
            --shimmer: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            /* Background remains your rolex.PNG */
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('./rolex.PNG');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .main-container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 85%;
            max-width: 480px;
            padding: 60px 40px;
            background: var(--glass);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 4px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .nasdaq-tag {
            font-size: 0.65rem;
            letter-spacing: 6px;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 12px;
            display: block;
            text-transform: uppercase;
        }

        /* Shimmer Effect on Title */
        h1 {
            font-size: 6rem;
            margin: 0;
            letter-spacing: -6px;
            font-weight: 900;
            text-transform: lowercase;
            line-height: 0.85;
            position: relative;
            background: linear-gradient(to bottom, #fff 40%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-size: 0.8rem;
            letter-spacing: 14px;
            text-transform: uppercase;
            opacity: 0.5;
            margin-top: 15px;
            margin-bottom: 45px;
            font-weight: 300;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .btn {
            text-decoration: none;
            color: white;
            border: 1px solid var(--border);
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            background: rgba(255,255,255,0.03);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 4px;
        }

        .btn:hover {
            background: white;
            color: black;
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 15px 30px rgba(255,255,255,0.1);
        }

        /* Improved Ticker */
        .ticker-wrap {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.95);
            padding: 15px 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            overflow: hidden;
            border-top: 1px solid var(--border);
            letter-spacing: 1px;
        }

        .ticker {
            display: inline-block;
            white-space: nowrap;
            animation: tickerMove 35s linear infinite;
        }

        .ticker span { margin-right: 80px; }
        .green { color: var(--accent); }
        .gold { color: #d4af37; }

        @keyframes tickerMove {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .music-info {
            margin-top: 40px;
            font-size: 0.6rem;
            opacity: 0.4;
            letter-spacing: 3px;
            font-weight: 500;
        }

        /* Small details to fill the "empty" space */
        .corner-dec {
            position: absolute;
            width: 15px;
            height: 15px;
            border: 1px solid var(--accent);
            opacity: 0.3;
        }
        .top-left { top: 15px; left: 15px; border-right: none; border-bottom: none; }
        .bottom-right { bottom: 15px; right: 15px; border-left: none; border-top: none; }

    </style>
</head>
<body>

    <div class="main-container">
        <div class="corner-dec top-left"></div>
        <div class="corner-dec bottom-right"></div>
        
        <span class="nasdaq-tag">INDEXED ACCESS // NAS100</span>
        <h1>73nq</h1>
        <h2>RELENTLESS PURSUIT.</h2>

        <div class="btn-group">
            <a href="https://discord.gg/ZNVeRGHFr" target="_blank" class="btn" title="Discord">
                <i class="fa-brands fa-discord"></i>
            </a>
            <a href="https://www.instagram.com/1heeeb777?igsh=MXVwbDNiYWV6YnR4ag%3D%3D&utm_source=qr" target="_blank" class="btn" title="Instagram">
                <i class="fa-brands fa-instagram"></i>
            </a>
        </div>

        <div class="music-info">
            LIVE: NOT AGAIN - MIAMI BEACH EDIT
        </div>
    </div>

    <div class="ticker-wrap">
        <div class="ticker">
            <span>NAS100: <span class="green">18,245.30 (+1.24%)</span></span>
            <span>XAUUSD: <span class="gold">2,154.20 (+0.45%)</span></span>
            <span>BTC: <span class="green">68,432.10 (+2.10%)</span></span>
            <span>ALPHA FUTURES: <span class="green">CERTIFIED</span></span>
            <span>73NQ STATUS: <span class="green">EXECUTING</span></span>
            <span>SMART MONEY CONCEPTS: <span class="green">ACTIVE</span></span>
        </div>
    </div>

</body>
</html>
