<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>73nq | Relentless Pursuit</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; /* Fallback if video fails */
            color: white; font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* This forces the video to stay behind EVERYTHING */
        #video-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -100; /* Extremely low so it stays back */
            transform: translateX(-50%) translateY(-50%);
            object-fit: cover;
            filter: brightness(0.5);
            background-size: cover;
        }

        .main-container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 85%;
            max-width: 450px;
            padding: 40px 20px;
            background: rgba(0, 0, 0, 0.5); /* Semi-transparent black */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            font-weight: 900;
            letter-spacing: -4px;
            /* Silver Gradient */
            background: linear-gradient(180deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-group { display: flex; justify-content: center; gap: 15px; margin-top: 30px; }
        .btn {
            text-decoration: none; color: white; border: 1px solid rgba(255,255,255,0.2);
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; border-radius: 4px; transition: 0.3s;
        }
        .btn:hover { background: white; color: black; }

        .ticker-wrap {
            position: fixed; bottom: 0; width: 100%; background: black;
            padding: 10px 0; font-family: monospace; font-size: 0.6rem;
        }
        .ticker { display: inline-block; white-space: nowrap; animation: ticker 30s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body onclick="playAll()">

    <video autoplay muted loop playsinline id="video-bg">
        <source src="background.MP4" type="video/mp4">
    </video>

    <audio id="bgMusic" loop>
        <source src="theme.mp3" type="audio/mpeg">
    </audio>

    <div class="main-container">
        <h1 id="title">73nq</h1>
        <p style="letter-spacing: 8px; font-size: 0.7rem; opacity: 0.7;">RELENTLESS PURSUIT</p>

        <div class="btn-group">
            <a href="https://discord.gg/ZNVeRGHFr" target="_blank" class="btn"><i class="fa-brands fa-discord"></i></a>
            <a href="https://www.instagram.com/1heeeb777" target="_blank" class="btn"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@73nqqq" target="_blank" class="btn"><i class="fa-brands fa-tiktok"></i></a>
        </div>
        
        <p id="audio-status" style="font-size: 0.5rem; margin-top: 30px; opacity: 0.4;">[ TAP TO ACTIVATE EXPERIENCE ]</p>
    </div>

    <div class="ticker-wrap">
        <div class="ticker">
            <span style="color:#2ecc71; margin-right: 50px;">NAS100: 18,245.30 (+1.24%)</span>
            <span style="color:#2ecc71; margin-right: 50px;">BTC: 68,432.10 (+2.10%)</span>
            <span style="color:#2ecc71; margin-right: 50px;">ALPHA FUTURES: CERTIFIED</span>
        </div>
    </div>

    <script>
        function playAll() {
            document.getElementById("bgMusic").play();
            document.getElementById("video-bg").play();
            document.getElementById("audio-status").innerHTML = "[ AUDIO & VIDEO ACTIVE ]";
            document.getElementById("audio-status").style.color = "#2ecc71";
        }
    </script>
</body>
</html>
