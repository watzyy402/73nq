<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>73nq | Relentless Pursuit</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.02);
            --border-glow: rgba(255, 255, 255, 0.05);
            --green: #2ecc71;
        }

        /* --- BACKGROUND LAYER (THE DESIGN) --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #010401;
            /* This is the magic. It fills the screen with your image. */
            background-image: url('background.png'); 
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            color: white;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Create a dark overlay to make text pop */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); /* 50% darker */
            z-index: 1;
        }

        /* --- LAYOUT WRAPPER --- */
        .page-container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
            max-width: 1400px; /* Constraints for larger screens */
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
        }

        /* --- HEADER & TITLES --- */
        header { flex: 0 0 auto; margin-top: 5vh; }
        
        .nasdaq-header {
            font-size: 0.7rem;
            letter-spacing: 4px;
            font-weight: 700;
            opacity: 0.5;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .nasdaq-box {
            border: 1px solid white;
            padding: 2px 6px;
        }

        h1 {
            font-size: 7rem;
            margin: 0;
            letter-spacing: -6px;
            font-weight: 800;
            background: linear-gradient(to bottom, #fff 30%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-size: 1.1rem;
            letter-spacing: 12px;
            text-transform: uppercase;
            opacity: 0.4;
            margin-top: -10px;
            margin-bottom: 60px;
        }

        /* --- CALL TO ACTION BUTTONS --- */
        .btn-container { flex: 1 0 auto; display: flex; align-items: center; justify-content: center; gap: 30px;}

        .glass-btn {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow);
            padding: 20px 45px;
            color: white;
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 4px;
            font-weight: 700;
            transition: all 0.4s;
            cursor: pointer;
        }

        .glass-btn:hover {
            border-color: #fff;
            transform: translateY(-5px);
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
        }

        /* --- FLOATING DECO ELEMENTS --- */
        .float {
            position: absolute;
            font-size: 0.8rem;
            opacity: 0.4;
            pointer-events: none;
            animation: floatAnim 6s ease-in-out infinite;
        }

        .p1 { top: 20%; left: 10%; color: var(--green); }
        .p2 { bottom: 30%; right: 10%; border: 1px solid gold; padding: 5px; opacity: 0.2;}
        .p3 { top: 15%; right: 15%; font-family: monospace;}

        @keyframes floatAnim {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* --- FOOTER & MUSIC STATUS --- */
        footer { flex: 0 0 auto; width: 100%; display: flex; justify-content: space-between; font-size: 0.6rem; opacity: 0.3; letter-spacing: 1px; text-transform: uppercase;}
        
    </style>
</head>
<body>

    <div class="page-container">
        
        <header>
            <div class="nasdaq-header">
                <div class="nasdaq-box">NASDAQ</div>
                <span>73NQ // RELENTLESS ACCESS</span>
            </div>
            <h1>73nq</h1>
            <h2>RELENTLESS PURSUIT.</h2>
        </header>

        <div class="btn-container">
            <a href="https://discord.gg/ZNVeRGHFr" target="_blank" class="glass-btn">[ DISCORD NETWORK ]</a>
            <a href="https://www.instagram.com/1heeeb777?igsh=MXVwbDNiYWV6YnR4ag%3D%3D&utm_source=qr" target="_blank" class="glass-btn">[ INSTAGRAM GALLERY ]</a>
        </div>

        <footer>
            <span>STATUS: ACTIVE // Smart Money Concept V3.1</span>
            <span>MUSIC: Not Again - Miami Beach (Woke up in Miami beach...)</span>
        </footer>

        <div class="float p1">NAS100: +$8,765.43 (DAILY_P/L)</div>
        <div class="float p2">ALPHA FUTURES: EXECUTIVE CERTIFIED</div>
        <div class="float p3">EURUSD: 1.0842 ▲</div>
    </div>

</body>
</html>
