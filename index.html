<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>73nq</title>  
  
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">  
  
<style>  
body {  
    margin: 0;  
    font-family: 'Playfair Display', serif;  
    color: white;  
    overflow: hidden;  
}  
  
/* 🌌 Luxury animated background */  
body::before {  
    content: "";  
    position: fixed;  
    width: 200%;  
    height: 200%;  
    background: radial-gradient(circle at center, #000 20%, #0a0a0a 40%, #001f3f 80%);  
    animation: moveBg 12s infinite linear;  
    z-index: -2;  
}  
  
@keyframes moveBg {  
    0% { transform: translate(0,0); }  
    50% { transform: translate(-20%, -20%); }  
    100% { transform: translate(0,0); }  
}  
  
/* 💸 floating particles */  
canvas {  
    position: fixed;  
    top: 0;  
    left: 0;  
    z-index: -1;  
}  
  
/* center */  
.container {  
    text-align: center;  
    margin-top: 10%;  
}  
  
/* 👑 name */  
h1 {  
    font-size: 60px;  
    letter-spacing: 3px;  
    text-shadow: 0 0 20px gold, 0 0 40px gold;  
}  
  
/* typing */  
#typing {  
    font-family: 'Orbitron', sans-serif;  
    font-size: 18px;  
    opacity: 0.8;  
}  
  
/* 💎 buttons */  
.link {  
    display: block;  
    width: 280px;  
    margin: 15px auto;  
    padding: 14px;  
    border-radius: 12px;  
    background: rgba(255,215,0,0.08);  
    border: 1px solid gold;  
    color: gold;  
    text-decoration: none;  
    transition: 0.3s;  
}  
  
.link:hover {  
    transform: scale(1.1);  
    background: gold;  
    color: black;  
    box-shadow: 0 0 25px gold;  
}  
  
/* 📈 fake candles */  
.candle {  
    position: absolute;  
    bottom: 0;  
    width: 6px;  
    background: lime;  
    animation: moveCandles 5s linear infinite;  
}  
  
@keyframes moveCandles {  
    from { transform: translateY(0); }  
    to { transform: translateY(-100vh); }  
}  
  
/* 💰 profit text */  
.profit {  
    position: absolute;  
    color: lime;  
    font-size: 14px;  
    animation: floatUp 4s linear infinite;  
}  
  
@keyframes floatUp {  
    from { transform: translateY(0); opacity: 1; }  
    to { transform: translateY(-200px); opacity: 0; }  
}  
  
</style>  
</head>  
  
<body>  
  
<canvas id="particles"></canvas>  
  
<div class="container">  
    <h1>73nq</h1>  
    <p id="typing"></p>  
  
    <a href="https://discord.gg/7d6YERuQc" class="link">Join Discord</a>  
</div>  
  
<script>  
// ⌨️ typing effect  
const text = [  
    "NASDAQ & S&P 500",  
    "Luxury Trader Lifestyle",  
    "SMC | Liquidity | Precision",  
    "Profits Only"  
];  
  
let count = 0;  
let index = 0;  
let currentText = "";  
let letter = "";  
  
(function type(){  
    if(count === text.length){ count = 0; }  
    currentText = text[count];  
    letter = currentText.slice(0, ++index);  
  
    document.getElementById("typing").textContent = letter;  
  
    if(letter.length === currentText.length){  
        count++;  
        index = 0;  
        setTimeout(type, 1200);  
    } else {  
        setTimeout(type, 40);  
    }  
})();  
  
// 💸 particles  
const canvas = document.getElementById("particles");  
const ctx = canvas.getContext("2d");  
  
canvas.width = window.innerWidth;  
canvas.height = window.innerHeight;  
  
let particles = [];  
  
for(let i=0;i<80;i++){  
    particles.push({  
        x: Math.random()*canvas.width,  
        y: Math.random()*canvas.height,  
        size: Math.random()*2  
    });  
}  
  
function draw(){  
    ctx.clearRect(0,0,canvas.width,canvas.height);  
    ctx.fillStyle = "gold";  
    particles.forEach(p=>{  
        ctx.beginPath();  
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);  
        ctx.fill();  
        p.y -= 0.3;  
        if(p.y < 0) p.y = canvas.height;  
    });  
    requestAnimationFrame(draw);  
}  
draw();  
  
// 📈 candles + profits spawn  
setInterval(()=>{  
    let c = document.createElement("div");  
    c.className = "candle";  
    c.style.left = Math.random()*100 + "vw";  
    c.style.height = (20 + Math.random()*80) + "px";  
    c.style.background = Math.random()>0.5 ? "lime" : "red";  
    document.body.appendChild(c);  
    setTimeout(()=>c.remove(),5000);  
  
    let p = document.createElement("div");  
    p.className = "profit";  
    p.style.left = Math.random()*100 + "vw";  
    p.style.bottom = "0";  
    p.innerText = "+" + (Math.random()*100).toFixed(2) + "%";  
    document.body.appendChild(p);  
    setTimeout(()=>p.remove(),4000);  
  
}, 500);  
</script>  
  
</body>  
</html>
