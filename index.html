<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>73nq x huzzino</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --accent: #2ecc71;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050505;
            color: #fff; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }

        /* BACKGROUND DEPTH */
        .ambient-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,1)),
                url('./rolex.png');
            background-size: cover; background-position: center;
            filter: grayscale(100%) contrast(110%);
            opacity: 0.4; z-index: -1;
            animation: slowZoom 20s infinite alternate;
        }

        @keyframes slowZoom { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* THE BLIND REVEAL ENTRANCE */
        .reveal-box { overflow: hidden; }
        .reveal-item { 
            transform: translateY(110%); 
            animation: revealUp 1.2s cubic-bezier(0.77, 0, 0.175, 1) forwards; 
        }

        @keyframes revealUp { to { transform: translateY(0); } }

        .main-face { text-align: center; z-index: 10; }
        
        .top-label { 
            font-size: 0.6rem; letter-spacing: 10px; text-transform: uppercase; 
            color: var(--accent); margin-bottom: 20px; font-weight: 700;
            animation-delay: 0.2s;
        }

        h1 {
            font-size: clamp(3rem, 12vw, 6rem); margin: 0; font-weight: 900;
            letter-spacing: -4px; line-height: 0.9; text-transform: lowercase;
            animation-delay: 0.4s;
        }

        h2 {
            font-size: 0.65rem; letter-spacing: 15px; opacity: 0.3; 
            margin: 20px 0 60px 0; font-weight: 300; text-transform: uppercase;
            animation-delay: 0.6s;
        }

        /* MINIMALIST NAV */
        .nav-links { display: flex; justify-content: center; gap: 30px; margin-bottom: 40px; animation-delay: 0.8s; }
        .nav-links a { color: #fff; text-decoration: none; font-size: 1.1rem; opacity: 0.3; transition: 0.4s; }
        .nav-links a:hover { opacity: 1; transform: translateY(-3px); }

        .cta-trigger {
            background: none; border: none; color: #fff; font-size: 0.7rem;
            letter-spacing: 6px; text-transform: uppercase; font-weight: 700;
            cursor: pointer; padding: 20px; position: relative; transition: 0.4s;
            animation-delay: 1s;
        }
        .cta-trigger::after {
            content: ''; position: absolute; bottom: 10px; left: 50%; width: 0;
            height: 1px; background: var(--accent); transition: 0.4s; transform: translateX(-50%);
        }
        .cta-trigger:hover::after { width: 40px; }
        .cta-trigger:hover { color: var(--accent); letter-spacing: 8px; }

        /* MENTORSHIP OVERLAY */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100;
            display: grid; grid-template-columns: 1fr;
            transform: translateX(100%); transition: 0.8s cubic-bezier(0.77, 0, 0.175, 1);
            overflow-y: auto; padding: 100px 20px;
        }
        .overlay.active { transform: translateX(0); }

        .close-overlay {
            position: fixed; top: 50px; right: 50px; cursor: pointer;
            font-size: 0.6rem; letter-spacing: 4px; opacity: 0.4; transition: 0.3s;
        }
        .close-overlay:hover { opacity: 1; color: var(--accent); }

        /* PARTNER GRIDS */
        .partner-group { max-width: 1000px; margin: 0 auto 100px auto; width: 100%; }
        .group-header { 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; margin-bottom: 30px;
        }
        .group-header span { font-size: 0.6rem; letter-spacing: 4px; text-transform: uppercase; opacity: 0.5; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .grid-item { aspect-ratio: 9/16; background: #0a0a0a; border-radius: 2px; overflow: hidden; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; transition: 0.6s; filter: saturate(0); }
        .grid-item:hover img { opacity: 1; filter: saturate(1); transform: scale(1.05); }

        /* TICKER */
        .footer-ticker {
            position: fixed; bottom: 0; width: 100%; padding: 20px 0;
            border-top: 1px solid rgba(255,255,255,0.03); background: #050505;
        }
        .ticker-text { display: flex; gap: 100px; animation: ticker 30s linear infinite; white-space: nowrap; }
        .ticker-text span { font-size: 0.6rem; letter-spacing: 3px; opacity: 0.2; font-family: monospace; }
        @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    </style>
</head>
<body onclick="document.getElementById('bgMusic').play()">

    <div class="main-face">

        <div style="text-align: center; margin-top: 50px;">
            <div style="font-size: 3rem; font-weight: 900; margin-bottom: 10px;">$39.99</div>
            <div style="font-size: 0.6rem; letter-spacing: 5px; opacity: 0.3; margin-bottom: 40px;">LIFETIME DUAL PASS</div>

        </div>
    </div>

    <div class="footer-ticker">
        <div class="ticker-text">
            <span>73NQ x HUZZINO</span><span>XAUUSD: MONITORING</span><span>NAS100: MONITORING</span><span>SMC CONFLUENCE</span>
            <span>73NQ x HUZZINO</span><span>XAUUSD: MONITORING</span><span>NAS100: MONITORING</span><span>SMC CONFLUENCE</span>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('menu').classList.toggle('active');
        }
    </script>
</body>
</html>
